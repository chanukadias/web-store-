<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Online Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    /* Header */
    .store-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #232f3e;
      padding: 15px;
      color: white;
    }
    .logo {
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 10px;
    }
    .search-bar {
      display: flex;
      width: 100%;
      max-width: 500px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px 0 0 4px;
    }
    .search-bar button {
      padding: 10px 15px;
      border: none;
      background: #febd69;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      font-weight: 500;
    }

    /* Product Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .product img {
      max-width: 100%;
      height: auto;
    }
    .product-name {
      font-weight: 500;
      margin: 10px 0;
    }
    .product-price {
      color: #b12704;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .add-to-cart {
      background: #ffa41c;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .products-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 480px) {
      .products-grid {
        grid-template-columns: 1fr;
      }
      .search-bar {
        flex-direction: row;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->

  <script>
    // Live search functionality
    function searchProducts() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const products = document.querySelectorAll('.product');
      products.forEach(product => {
        const name = product.querySelector('.product-name').textContent.toLowerCase();
        product.style.display = name.includes(input) ? 'block' : 'none';
      });
    }

    // Redirect Add to Cart to another HTML file
